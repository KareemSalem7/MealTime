services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: mealtime
      POSTGRES_USER: mealtime
      POSTGRES_PASSWORD: password
    ports:
      - "5543:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealtime -d mealtime"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/mealtime
      SPRING_DATASOURCE_USERNAME: mealtime
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres-data:
