spring.application.name=spring-boot

spring.datasource.url=jdbc:postgresql://localhost:5432/mealtime
spring.datasource.username=mealtime
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver


# if you make this spring.jpa.hibernate.ddl-auto=create-drop,
# it will delete all the tables and recreate them every time you run the application
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
